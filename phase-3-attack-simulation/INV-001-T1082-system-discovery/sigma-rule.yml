title: System Information Discovery via Native Utilities
id: a9d8e4f2-3b1c-4d8e-9f2a-1c3b5d7e9f2a
status: experimental
description: >
  Detects execution of native Windows utilities commonly used for
  system information discovery. Adversaries enumerate OS version,
  hardware configuration, patch level, and unique identifiers to
  inform follow-on attack decisions including exploit selection and
  payload delivery.
author: SOC Lab
date: 2026/04/13
tags:
  - attack.discovery
  - attack.t1082
references:
  - https://attack.mitre.org/techniques/T1082/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\systeminfo.exe'
      - '\hostname.exe'
      - '\whoami.exe'
    CommandLine|contains:
      - 'systeminfo'
      - 'hostname'
      - 'whoami'
      - 'MachineGuid'
  condition: selection
falsepositives:
  - Legitimate administrative activity
  - IT asset management tools
  - Monitoring and endpoint agents
  - Help desk remote support tooling
level: low
