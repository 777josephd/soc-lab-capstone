title: T1135 - Network Share Discovery via CLI and SMB Share Access
id: a7f3c821-4d2e-4b9a-8f1e-3c6d9e0b5a42
status: experimental
description: >
  Detects network share discovery activity via native Windows CLI commands
  (net view, net share, dir UNC paths) or PowerShell Get-SmbShare cmdlet,
  as well as authenticated user access to administrative shares (C$, ADMIN$,
  IPC$) where the accessing account is not a machine account. The 5140
  user-vs-machine-account distinction is a high-fidelity behavioral signal
  for human-initiated share enumeration independent of process creation
  telemetry. Technique is used by adversaries as a precursor to lateral
  movement or collection, and is heavily represented in ransomware
  pre-encryption workflows. Observed in APT32 (Operation Cobalt Kitty),
  APT39 (CrackMapExec), Conti (NetShareEnum API), Emotet
  (WNetEnumResourceW), and Latrodectus (net view /all).
references:
  - https://attack.mitre.org/techniques/T1135/
  - https://cdn2.hubspot.net/hubfs/3354902/Cybereason%20Labs%20Analysis%20Operation%20Cobalt%20Kitty.pdf
  - https://www.carbonblack.com/blog/tau-threat-discovery-conti-ransomware/
author: SOC Lab Capstone — soc-lab.local
date: 2026-04-16
modified: 2026-04-16
tags:
  - attack.discovery
  - attack.t1135
logsource:
  product: windows
  category: process_creation
detection:
  selection_process_commands:
    EventID:
      - 4688
      - 1
    CommandLine|contains:
      - 'net view'
      - 'net share'
      - 'Get-SmbShare'
      - 'dir \\\\'

  selection_share_access:
    EventID: 5140
    ShareName|contains:
      - '\C$'
      - '\ADMIN$'
      - '\IPC$'

  filter_machine_accounts:
    AccountName|endswith: '$'

  condition: >
    selection_process_commands
    or (selection_share_access and not filter_machine_accounts)

falsepositives:
  - Legitimate administrator activity using net view or net share
    for IT operations or share inventory purposes
  - Automated backup or monitoring tools accessing administrative
    shares under user-context accounts rather than service accounts
  - PowerShell scripts run by IT staff using Get-SmbShare for
    scheduled share auditing or compliance checks
fields:
  - CommandLine
  - Image
  - ParentImage
  - AccountName
  - ShareName
  - SharePath
  - LogonId
  - SourceIp
level: medium
